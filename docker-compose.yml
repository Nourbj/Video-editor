version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3005:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./temp:/app/temp
      - ./cookies/ytdlp_cookies.txt:/app/cookies.txt:ro
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - YTDLP_COOKIES=/app/cookies.txt
      - YTDLP_DEBUG=true
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5175:80"
    depends_on:
      - backend
    restart: unless-stopped
